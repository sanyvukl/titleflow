app.jwt.expiration-ms=86400000

app.document-storage.local-root=uploaded-documents
app.document-storage.max-file-size-bytes=10485760
app.document-storage.allowed-content-types=application/pdf,image/png,image/jpeg
app.document-storage.allowed-extensions=.pdf,.png,.jpg,.jpeg

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB